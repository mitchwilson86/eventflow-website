<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventFlow — Settings</title>
  <meta name="description" content="EventFlow venue settings — configure AI tone, brand voice, escalation rules, and menu links for your restaurant.">
  <link rel="canonical" href="https://eventflowsales.com/settings">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/eventflow-shared.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="/eventflow-admin.js" defer></script>
  <style>
    /* Settings-specific: add menu button styling */
    .add-menu-btn {
      margin-top: 8px; background: none; border: 1px solid var(--border);
      color: var(--text-secondary); padding: 6px 14px; border-radius: 6px;
      font-size: 12px; cursor: pointer; font-family: var(--font);
    }
    .add-menu-btn:hover { border-color: var(--teal); color: var(--teal); }
    .space-row { border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .space-row .full { grid-column: 1 / -1; }
    .space-row label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .space-row input[type=text], .space-row input[type=number], .space-row input[type=url], .space-row textarea {
      width: 100%; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-primary); font-family: var(--font); font-size: 14px;
      transition: border-color .2s;
    }
    .space-row input:focus, .space-row textarea:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(21,97,109,.1); }
    .space-row textarea { min-height: 60px; resize: vertical; }
    .photo-rows { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .photo-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; }
    .photo-row input { width: 100%; padding: 8px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-family: var(--font); font-size: 13px; }
    .photo-row input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(21,97,109,.1); }
    .photo-row .photo-remove { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .photo-row .photo-remove:hover { border-color: var(--red); color: var(--red); }
    .add-photo-btn { margin-top: 6px; background: none; border: 1px dashed var(--border); color: var(--text-secondary); padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: var(--font); }
    .add-photo-btn:hover { border-style: solid; border-color: var(--teal); color: var(--teal); }
    .photos-hint { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
    .buyout-label {
      display: inline-flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; color: var(--text-primary); cursor: pointer; text-transform: none;
      letter-spacing: normal; font-weight: 400; margin-bottom: 0;
    }
    .buyout-label input[type=checkbox] { margin: 0; width: 16px; height: 16px; accent-color: var(--teal); }
    .space-remove { background: none; border: none; color: var(--red); font-size: 12px; cursor: pointer; padding: 4px 8px; }
    .space-remove:hover { text-decoration: underline; }
    .auth-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .auth-row input {
      flex: 1; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-primary); font-family: var(--font); font-size: 14px;
    }
    .auth-row input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(21,97,109,.1); }
    /* venue-picker-row + admin-badge styles are in eventflow-shared.css */
  </style>
</head>

        var s = document.createElement('style');
        s.textContent = '#login-screen{display:none !important}';
        document.head.appendChild(s);

<script>
/* ═══ CLIENT DATA ═══ */
// Admin-aware auth lives in /eventflow-admin.js (window.EF_ADMIN).
// Each CLIENTS entry: { slug, gmail_address, venue, authorized_emails, data }.
var CLIENTS = {
  sunda: { slug: 'sunda-nashville', gmail_address: 'sales@eventflowsales.com', venue: 'Sunda Nashville', authorized_emails: [], data: {} }
};

var DATA_URL = 'https://script.google.com/macros/s/AKfycbxEpfGswzFnPTFLaKWlt332kv6Jy7vdagPcDEDMXbEDwrrFzpoPLc8wrmTW5UEB2xVj8w/exec';
var GOOGLE_CLIENT_ID = '551797277858-ne7qntlo2jgmdp36o2lpcnv8qr6u7ofv.apps.googleusercontent.com';
var currentClient = null;

function resolveClientForEmail(email) {
  return (window.EF_ADMIN && EF_ADMIN.resolveClient(CLIENTS, email))
    || Object.values(CLIENTS).find(function(c){ return (c.gmail_address || '').toLowerCase() === (email || '').toLowerCase(); })
    || null;
}

/* ═══ SIDEBAR TOGGLE ═══ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('active');
}

/* ═══ AUTH ═══ */
function initGoogleSignIn() {
  if (typeof google === 'undefined' || !google.accounts) { setTimeout(initGoogleSignIn, 500); return; }
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleSignIn, auto_select: true });
  google.accounts.id.renderButton(document.getElementById('google-signin-btn'), { theme: 'outline', size: 'large', width: 340, text: 'signin_with', shape: 'rectangular' });
  var savedEmail = sessionStorage.getItem('ef_user_email');
  if (savedEmail) {
    var client = resolveClientForEmail(savedEmail);
    if (client) {
      document.getElementById('session-msg').style.display = 'block';
      currentClient = client;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderPage(client);
      if (window.EF_ADMIN) EF_ADMIN.showAdminNav();
    }
  }
}

function handleGoogleSignIn(response) {
  var idToken = response.credential;
  var payload = JSON.parse(atob(idToken.split('.')[1]));
  var email = payload.email;
  var errEl = document.getElementById('login-error');
  var client = resolveClientForEmail(email);
  if (!client) { errEl.textContent = 'Access denied. ' + email + ' is not authorized.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  sessionStorage.setItem('ef_user_email', email);
  sessionStorage.setItem('ef_id_token', idToken);
  sessionStorage.setItem('ef_id_token_exp', String(payload.exp * 1000));
  currentClient = client;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  renderPage(client);
  if (window.EF_ADMIN) EF_ADMIN.showAdminNav();
}

window.addEventListener('load', function() { initGoogleSignIn(); loadDynamicClients(); });

function loadDynamicClients() {
  fetch(DATA_URL + '?type=client_list').then(function(r) { return r.json(); }).then(function(data) {
    if (!data.clients || !data.clients.length) return;
    for (var i = 0; i < data.clients.length; i++) {
      var c = data.clients[i];
      var existing = Object.values(CLIENTS).find(function(cl) { return cl.gmail_address === c.gmail || cl.venue === c.venue; });
      var authList = [];
      try { authList = JSON.parse(c.authorized_emails || '[]') || []; } catch(e) { authList = []; }
      if (existing) {
        existing.slug = c.slug;
        existing.authorized_emails = authList;
        continue;
      }
      // Include pending venues too — fresh signups need to edit their own
      // settings before Mitchell approves. Backend already excludes deleted.
      var key = c.slug.replace(/[^a-z0-9]/g, '');
      CLIENTS[key] = {
        slug: c.slug,
        gmail_address: c.gmail || '',
        venue: c.venue || c.slug,
        authorized_emails: authList,
        data: {}
      };
    }
    // If the user signed in before their own venue row arrived (fresh
    // signup lands on /settings?welcome=1 with CLIENTS still empty), try
    // resolving again now that client_list has loaded.
    if (!currentClient) {
      var savedEmail = sessionStorage.getItem('ef_user_email');
      if (savedEmail) {
        var c3 = resolveClientForEmail(savedEmail);
        if (c3) {
          currentClient = c3;
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          renderPage(c3);
          if (window.EF_ADMIN) EF_ADMIN.showAdminNav();
        }
      }
    }
    if (window.EF_ADMIN && EF_ADMIN.isAdminCaller()) {
      EF_ADMIN.setupVenuePicker(CLIENTS, function(slug) {
        var c2 = Object.values(CLIENTS).find(function(x){ return x.slug === slug; });
        if (!c2) return;
        currentClient = c2;
        renderPage(c2);
      });
    }
  }).catch(function() {});
}

function doLogout() {
  currentClient = null;
  sessionStorage.removeItem('ef_user_email');
  sessionStorage.removeItem('ef_id_token');
  sessionStorage.removeItem('ef_id_token_exp');
  if (typeof google !== 'undefined' && google.accounts) google.accounts.id.disableAutoSelect();
  window.location.href = '/dashboard';
}

/* ═══ RENDER ═══ */
function renderPage(client) {
  document.getElementById('venue-name').textContent = client.venue;
  var signedInEmail = sessionStorage.getItem('ef_user_email') || client.gmail_address || '';
  if (signedInEmail) {
    document.getElementById('user-email-sidebar').textContent = signedInEmail;
  }
  loadSettings();
}

/* ═══ SETTINGS ═══ */
// We need two things to load settings:
//   1. The client_slug — looked up from the logged-in email via client_list
//   2. The full row (incl. spaces_json, parking_info, etc.) — fetched via the
//      authenticated get_settings action, which is scoped to the venue.
function loadSettings() {
  if (!currentClient) return;
  if (currentClient.slug) {
    currentClient._slug = currentClient.slug;
    fetchFullSettings(currentClient.slug);
    return;
  }
  // Fallback: look up slug from client_list if we only have gmail_address
  fetch(DATA_URL + '?type=client_list')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var c = (data.clients || []).find(function(cl) { return cl.venue === currentClient.venue || cl.gmail === currentClient.gmail_address; });
      if (!c) return;
      currentClient._slug = c.slug;
      currentClient.slug = c.slug;
      return fetchFullSettings(c.slug);
    })
    .catch(function(err) { console.warn('Settings load failed:', err); });
}

function fetchFullSettings(slug) {
  var idToken = sessionStorage.getItem('ef_id_token');
  var exp = parseInt(sessionStorage.getItem('ef_id_token_exp') || '0', 10);
  if (!idToken || !exp || Date.now() > exp) {
    // Expired token — can't load the full row. Fall back to rendering empty rows.
    hydrateFromRow({});
    return;
  }
  fetch(DATA_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'get_settings', id_token: idToken, client_slug: slug })
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      hydrateFromRow(data && data.success ? (data.settings || {}) : {});
    })
    .catch(function(err) {
      console.warn('get_settings failed:', err);
      hydrateFromRow({});
    });
}

function hydrateFromRow(r) {
  document.getElementById('set-venue-name').value = r.venue_name || '';
  document.getElementById('set-website').value = r.website_url || '';
  document.getElementById('set-ai-tone').value = r.ai_tone || '';
  document.getElementById('set-brand-voice').value = r.brand_voice || '';
  document.getElementById('set-escalation-threshold').value = r.escalation_threshold || 29;
  document.getElementById('set-escalation-name').value = r.escalation_contact_name || '';
  document.getElementById('set-escalation-email').value = r.escalation_contact_email || '';
  document.getElementById('set-parking-info').value = r.parking_info || '';
  document.getElementById('set-billing-policy-short').value = r.billing_policy_short || '';
  document.getElementById('set-sender-name').value = r.sender_name || '';
  document.getElementById('set-sender-role').value = r.sender_role || '';
  document.getElementById('set-sender-direct-line').value = r.sender_direct_line || '';
  document.getElementById('set-social-proof').value = r.social_proof || '';
  document.getElementById('set-logo-url').value = r.logo_url || '';

  // Spaces
  var spacesContainer = document.getElementById('spaces-rows');
  spacesContainer.innerHTML = '';
  try {
    var spaces = JSON.parse(r.spaces_json || '[]');
    if (Array.isArray(spaces) && spaces.length) {
      spaces.forEach(function(s) { addSpaceRow(s); });
    } else {
      addSpaceRow();
    }
  } catch(e) { addSpaceRow(); }

  // Team access
  var authContainer = document.getElementById('auth-rows');
  authContainer.innerHTML = '';
  try {
    var emails = JSON.parse(r.authorized_emails || '[]');
    if (Array.isArray(emails) && emails.length) {
      emails.forEach(function(em) { addAuthRow(em); });
    } else {
      addAuthRow();
    }
  } catch(e) { addAuthRow(); }

  // Menus
  var menuContainer = document.getElementById('menu-rows');
  menuContainer.innerHTML = '';
  try {
    var menus = JSON.parse(r.menus_json || '[]');
    menus.forEach(function(m) { addMenuRow(m.name, m.url); });
  } catch(e) { /* fall through */ }
  if (menuContainer.children.length === 0) addMenuRow('', '');
}

function addMenuRow(name, url) {
  var container = document.getElementById('menu-rows');
  var row = document.createElement('div');
  row.className = 'menu-row';
  row.innerHTML = '<input type="text" placeholder="Menu name" value="' + esc(name || '') + '" /><input type="url" placeholder="https://menu-link.com" value="' + esc(url || '') + '" />';
  container.appendChild(row);
}

function addSpaceRow(s) {
  s = s || {};
  var container = document.getElementById('spaces-rows');
  var row = document.createElement('div');
  row.className = 'space-row';
  row.innerHTML =
    '<div><label>Name</label><input type="text" class="s-name" value="' + esc(s.name || '') + '" placeholder="Private Dining Room" /></div>' +
    '<div><label>Seated capacity</label><input type="number" class="s-seated" value="' + esc(s.capacity_seated != null ? s.capacity_seated : '') + '" min="1" /></div>' +
    '<div class="full"><label>Description</label><textarea class="s-desc" placeholder="Short description of the space">' + esc(s.description || '') + '</textarea></div>' +
    '<div><label>Standing capacity</label><input type="number" class="s-standing" value="' + esc(s.capacity_standing != null ? s.capacity_standing : '') + '" min="1" /></div>' +
    '<div><label>F&B minimum — weekday ($)</label><input type="number" class="s-fbwk" value="' + esc(s.fb_min_weekday != null ? s.fb_min_weekday : '') + '" min="0" /></div>' +
    '<div><label>F&B minimum — weekend ($)</label><input type="number" class="s-fbwe" value="' + esc(s.fb_min_weekend != null ? s.fb_min_weekend : '') + '" min="0" /></div>' +
    '<div class="full"><label class="buyout-label"><input type="checkbox" class="s-private" ' + ((s.is_private === false) ? '' : 'checked') + ' /> Private space (guests have the room to themselves — uncheck for shared or semi-private areas)</label></div>' +
    '<div class="full"><label class="buyout-label"><input type="checkbox" class="s-buyout" ' + (s.buyout ? 'checked' : '') + ' /> This space is a full buyout of the venue</label></div>' +
    '<div class="full">' +
      '<label>Photos</label>' +
      '<div class="photos-hint">Add a photo URL and an optional caption. Captions help the AI describe the space accurately in first-touch replies.</div>' +
      '<div class="photo-rows"></div>' +
      '<button type="button" class="add-photo-btn">+ Add photo</button>' +
    '</div>' +
    '<div class="full" style="text-align:right;"><button type="button" class="space-remove" onclick="this.closest(\'.space-row\').remove()">Remove this space</button></div>';
  container.appendChild(row);

  var photosContainer = row.querySelector('.photo-rows');
  var existing = Array.isArray(s.photos) ? s.photos : [];
  existing.forEach(function(p) {
    if (typeof p === 'string') addPhotoRow(photosContainer, p, '');
    else if (p && typeof p === 'object') addPhotoRow(photosContainer, p.url || '', p.caption || '');
  });
  if (existing.length === 0) addPhotoRow(photosContainer, '', '');

  row.querySelector('.add-photo-btn').addEventListener('click', function() {
    addPhotoRow(photosContainer, '', '');
  });
}

function addPhotoRow(container, url, caption) {
  var row = document.createElement('div');
  row.className = 'photo-row';
  row.innerHTML =
    '<input type="url" class="p-url" placeholder="https://photos.example.com/space1.jpg" value="' + esc(url || '') + '" />' +
    '<input type="text" class="p-caption" placeholder="Caption (optional) — e.g. Main dining room" value="' + esc(caption || '') + '" />' +
    '<button type="button" class="photo-remove">Remove</button>';
  row.querySelector('.photo-remove').addEventListener('click', function() { row.remove(); });
  container.appendChild(row);
}

function addAuthRow(email) {
  var container = document.getElementById('auth-rows');
  var row = document.createElement('div');
  row.className = 'auth-row';
  row.innerHTML =
    '<input type="email" placeholder="teammate@yourrestaurant.com" value="' + esc(email || '') + '" />' +
    '<button type="button" class="space-remove" onclick="this.closest(\'.auth-row\').remove()">Remove</button>';
  container.appendChild(row);
}

function collectSpaces() {
  var rows = document.getElementById('spaces-rows').querySelectorAll('.space-row');
  var out = [];
  rows.forEach(function(row) {
    var name = row.querySelector('.s-name').value.trim();
    if (!name) return; // skip empty rows
    var photoRows = row.querySelectorAll('.photo-row');
    var photos = [];
    photoRows.forEach(function(pr) {
      var url = pr.querySelector('.p-url').value.trim();
      if (!url) return; // skip rows without a URL
      var caption = pr.querySelector('.p-caption').value.trim();
      photos.push({ url: url, caption: caption });
    });
    out.push({
      name: name,
      description: row.querySelector('.s-desc').value.trim(),
      capacity_seated: parseInt(row.querySelector('.s-seated').value, 10) || 0,
      capacity_standing: parseInt(row.querySelector('.s-standing').value, 10) || 0,
      is_private: row.querySelector('.s-private').checked,
      buyout: row.querySelector('.s-buyout').checked,
      fb_min_weekday: parseInt(row.querySelector('.s-fbwk').value, 10) || 0,
      fb_min_weekend: parseInt(row.querySelector('.s-fbwe').value, 10) || 0,
      photos: photos
    });
  });
  return out;
}

function collectAuthEmails() {
  var rows = document.getElementById('auth-rows').querySelectorAll('.auth-row');
  var out = [];
  rows.forEach(function(row) {
    var v = row.querySelector('input').value.trim().toLowerCase();
    if (v && out.indexOf(v) === -1) out.push(v);
  });
  return out;
}

function saveSettings() {
  if (!currentClient || !currentClient._slug) {
    document.getElementById('settings-status').textContent = 'Error: no client selected';
    return;
  }
  var btn = document.getElementById('save-settings-btn');
  var status = document.getElementById('settings-status');
  btn.disabled = true;
  status.textContent = 'Saving...';
  status.style.color = 'var(--text-muted)';

  var menuRows = document.getElementById('menu-rows').querySelectorAll('.menu-row');
  var menus = [];
  menuRows.forEach(function(row) {
    var inputs = row.querySelectorAll('input');
    var name = inputs[0].value.trim();
    var url = inputs[1].value.trim();
    if (name || url) menus.push({ name: name, url: url, description: '' });
  });

  // Require a fresh Google ID token (Apps Script verifies it server-side).
  // Tokens expire after 1 hour, so prompt re-sign-in if stale.
  var idToken = sessionStorage.getItem('ef_id_token');
  var exp = parseInt(sessionStorage.getItem('ef_id_token_exp') || '0', 10);
  if (!idToken || !exp || Date.now() > exp) {
    btn.disabled = false;
    status.textContent = 'Session expired. Please sign in again to save changes.';
    status.style.color = 'var(--red)';
    sessionStorage.removeItem('ef_id_token');
    sessionStorage.removeItem('ef_id_token_exp');
    setTimeout(function() { window.location.reload(); }, 1500);
    return;
  }

  var payload = {
    id_token: idToken,
    client_slug: currentClient._slug,
    venue_name: document.getElementById('set-venue-name').value.trim(),
    website_url: document.getElementById('set-website').value.trim(),
    ai_tone: document.getElementById('set-ai-tone').value.trim(),
    brand_voice: document.getElementById('set-brand-voice').value.trim(),
    escalation_threshold: parseInt(document.getElementById('set-escalation-threshold').value) || 29,
    escalation_contact_name: document.getElementById('set-escalation-name').value.trim(),
    escalation_contact_email: document.getElementById('set-escalation-email').value.trim(),
    parking_info: document.getElementById('set-parking-info').value.trim(),
    billing_policy_short: document.getElementById('set-billing-policy-short').value.trim(),
    sender_name: document.getElementById('set-sender-name').value.trim(),
    sender_role: document.getElementById('set-sender-role').value.trim(),
    sender_direct_line: document.getElementById('set-sender-direct-line').value.trim(),
    social_proof: document.getElementById('set-social-proof').value.trim(),
    logo_url: document.getElementById('set-logo-url').value.trim(),
    spaces_json: JSON.stringify(collectSpaces()),
    authorized_emails: JSON.stringify(collectAuthEmails()),
    menus_json: JSON.stringify(menus)
  };

  // Use text/plain Content-Type to avoid CORS preflight. Apps Script Web Apps
  // don't respond to OPTIONS preflight with the headers browsers require, so
  // POSTs with Content-Type: application/json get blocked at the preflight
  // stage before reaching doPost. text/plain is a "simple" request that skips
  // preflight entirely. doPost still reads e.postData.contents and parses it
  // as JSON — the Content-Type header is just metadata.
  fetch(DATA_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.disabled = false;
      if (data.success) {
        status.textContent = 'Settings saved! Changes take effect on the next email.';
        status.style.color = 'var(--green)';
      } else {
        status.textContent = 'Error: ' + (data.error || 'unknown');
        status.style.color = 'var(--red)';
      }
    })
    .catch(function(err) {
      btn.disabled = false;
      status.textContent = 'Save failed: ' + err.message;
      status.style.color = 'var(--red)';
    });
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>

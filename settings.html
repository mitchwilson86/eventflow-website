<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventFlow — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/eventflow-shared.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* Settings-specific: add menu button styling */
    .add-menu-btn {
      margin-top: 8px; background: none; border: 1px solid var(--border);
      color: var(--text-secondary); padding: 6px 14px; border-radius: 6px;
      font-size: 12px; cursor: pointer; font-family: var(--font);
    }
    .add-menu-btn:hover { border-color: var(--teal); color: var(--teal); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">EventFlow</div>
    <div class="subtitle">Settings</div>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
    <button id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-divider">or sign in with Google</div>
    <div id="google-signin-btn"></div>
    <div class="login-error" id="login-error">Access denied.</div>
    <div class="login-session-msg" id="session-msg">Signing you in...</div>
  </div>
</div>

<!-- SETTINGS PAGE -->
<div id="dashboard">
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-logo">EventFlow</span>
        <span class="venue-name" id="venue-name"></span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="/campaigns" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          <span>Campaigns</span>
        </a>
        <a href="/settings" class="nav-item active">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <span class="user-email" id="user-email-sidebar"></span>
        <button class="logout-btn" onclick="doLogout()">Sign Out</button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Main -->
    <div class="main-content">
      <div class="top-bar">
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
        <span class="page-title">Venue Settings</span>
        <div></div>
      </div>
      <div class="dash-body">

        <div class="panel">
          <div class="settings-grid">
            <div class="settings-field">
              <label>Venue Name</label>
              <input type="text" id="set-venue-name" placeholder="Your Restaurant Name" />
            </div>
            <div class="settings-field">
              <label>Website URL</label>
              <input type="url" id="set-website" placeholder="https://yourrestaurant.com" />
            </div>
            <div class="settings-field full">
              <label>AI Tone (how the AI sounds in emails)</label>
              <textarea id="set-ai-tone" placeholder="e.g., warm, polished, friendly, conversational"></textarea>
            </div>
            <div class="settings-field full">
              <label>Brand Voice (specific personality instructions)</label>
              <textarea id="set-brand-voice" placeholder="e.g., You sound like a real person who genuinely wants to help guests plan a great event."></textarea>
            </div>
            <div class="settings-field">
              <label>Escalation Guest Count (triggers manager handoff)</label>
              <input type="number" id="set-escalation-threshold" min="1" max="500" />
            </div>
            <div class="settings-field">
              <label>Escalation Contact Name</label>
              <input type="text" id="set-escalation-name" placeholder="Manager name" />
            </div>
            <div class="settings-field">
              <label>Escalation Contact Email</label>
              <input type="email" id="set-escalation-email" placeholder="manager@restaurant.com" />
            </div>
            <div class="settings-field">
              <label>&nbsp;</label>
            </div>
            <div class="settings-field full">
              <label>Menu Links</label>
              <div id="menu-rows"></div>
              <button class="add-menu-btn" onclick="addMenuRow()">+ Add Menu</button>
            </div>
          </div>
          <div class="settings-actions">
            <button class="settings-save" id="save-settings-btn" onclick="saveSettings()">Save Settings</button>
            <span class="settings-status" id="settings-status"></span>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
/* ═══ CLIENT DATA ═══ */
var CLIENTS = {
  sunda: { username: 'sunda', password: 'eventflow2026', gmail_address: 'sales@eventflowsales.com', venue: 'Sunda Nashville', data: {} },
  demo: { username: 'demo', password: 'demo2026', venue: 'Demo Restaurant', data: {} }
};

var DATA_URL = 'https://script.google.com/macros/s/AKfycbxEpfGswzFnPTFLaKWlt332kv6Jy7vdagPcDEDMXbEDwrrFzpoPLc8wrmTW5UEB2xVj8w/exec';
var GOOGLE_CLIENT_ID = '551797277858-ne7qntlo2jgmdp36o2lpcnv8qr6u7ofv.apps.googleusercontent.com';
var currentClient = null;

/* ═══ SIDEBAR TOGGLE ═══ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('active');
}

/* ═══ AUTH ═══ */
function initGoogleSignIn() {
  if (typeof google === 'undefined' || !google.accounts) { setTimeout(initGoogleSignIn, 500); return; }
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleSignIn, auto_select: true });
  google.accounts.id.renderButton(document.getElementById('google-signin-btn'), { theme: 'outline', size: 'large', width: 340, text: 'signin_with', shape: 'rectangular' });
  var savedEmail = sessionStorage.getItem('ef_user_email');
  if (savedEmail) {
    var client = Object.values(CLIENTS).find(function(c) { return c.gmail_address === savedEmail; });
    if (client) {
      document.getElementById('session-msg').style.display = 'block';
      currentClient = client;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderPage(client);
    }
  }
}

function handleGoogleSignIn(response) {
  var payload = JSON.parse(atob(response.credential.split('.')[1]));
  var email = payload.email;
  var errEl = document.getElementById('login-error');
  var client = Object.values(CLIENTS).find(function(c) { return c.gmail_address === email; });
  if (!client) { errEl.textContent = 'Access denied. ' + email + ' is not authorized.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  sessionStorage.setItem('ef_user_email', email);
  currentClient = client;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  renderPage(client);
}

window.addEventListener('load', function() { initGoogleSignIn(); loadDynamicClients(); });

function loadDynamicClients() {
  fetch(DATA_URL + '?type=client_list').then(function(r) { return r.json(); }).then(function(data) {
    if (!data.clients || !data.clients.length) return;
    for (var i = 0; i < data.clients.length; i++) {
      var c = data.clients[i];
      var existing = Object.values(CLIENTS).find(function(cl) { return cl.gmail_address === c.gmail || cl.venue === c.venue; });
      if (existing) continue;
      if (c.status !== 'active') continue;
      var slug = c.slug.replace(/[^a-z0-9]/g, '');
      CLIENTS[slug] = { username: slug, password: '', gmail_address: c.gmail || '', venue: c.venue || c.slug, data: {} };
    }
  }).catch(function() {});
}

function doLogin() {
  var u = document.getElementById('username').value.trim().toLowerCase();
  var p = document.getElementById('password').value;
  var errEl = document.getElementById('login-error');
  var client = Object.values(CLIENTS).find(function(c) { return c.username === u && c.password === p; });
  if (!client) { errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  if (client.gmail_address) sessionStorage.setItem('ef_user_email', client.gmail_address);
  currentClient = client;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  renderPage(client);
}

function doLogout() {
  currentClient = null;
  sessionStorage.removeItem('ef_user_email');
  if (typeof google !== 'undefined' && google.accounts) google.accounts.id.disableAutoSelect();
  window.location.href = '/dashboard';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});

/* ═══ RENDER ═══ */
function renderPage(client) {
  document.getElementById('venue-name').textContent = client.venue;
  if (client.gmail_address) {
    document.getElementById('user-email-sidebar').textContent = client.gmail_address;
  }
  loadSettings();
}

/* ═══ SETTINGS ═══ */
function loadSettings() {
  if (!currentClient) return;
  fetch(DATA_URL + '?type=client_list')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var c = (data.clients || []).find(function(cl) { return cl.venue === currentClient.venue || cl.gmail === currentClient.gmail_address; });
      if (!c) return;
      document.getElementById('set-venue-name').value = c.venue || '';
      document.getElementById('set-website').value = c.website_url || '';
      document.getElementById('set-ai-tone').value = c.ai_tone || '';
      document.getElementById('set-brand-voice').value = c.brand_voice || '';
      document.getElementById('set-escalation-threshold').value = c.escalation_threshold || 29;
      document.getElementById('set-escalation-name').value = c.escalation_contact_name || '';
      document.getElementById('set-escalation-email').value = c.escalation_contact_email || '';
      var menuContainer = document.getElementById('menu-rows');
      menuContainer.innerHTML = '';
      try {
        var menus = JSON.parse(c.menus_json || '[]');
        menus.forEach(function(m) { addMenuRow(m.name, m.url); });
      } catch(e) { addMenuRow('', ''); }
      if (menuContainer.children.length === 0) addMenuRow('', '');
      currentClient._slug = c.slug;
    })
    .catch(function(err) { console.warn('Settings load failed:', err); });
}

function addMenuRow(name, url) {
  var container = document.getElementById('menu-rows');
  var row = document.createElement('div');
  row.className = 'menu-row';
  row.innerHTML = '<input type="text" placeholder="Menu name" value="' + esc(name || '') + '" /><input type="url" placeholder="https://menu-link.com" value="' + esc(url || '') + '" />';
  container.appendChild(row);
}

function saveSettings() {
  if (!currentClient || !currentClient._slug) {
    document.getElementById('settings-status').textContent = 'Error: no client selected';
    return;
  }
  var btn = document.getElementById('save-settings-btn');
  var status = document.getElementById('settings-status');
  btn.disabled = true;
  status.textContent = 'Saving...';
  status.style.color = 'var(--text-muted)';

  var menuRows = document.getElementById('menu-rows').querySelectorAll('.menu-row');
  var menus = [];
  menuRows.forEach(function(row) {
    var inputs = row.querySelectorAll('input');
    var name = inputs[0].value.trim();
    var url = inputs[1].value.trim();
    if (name || url) menus.push({ name: name, url: url, description: '' });
  });

  var payload = {
    client_slug: currentClient._slug,
    venue_name: document.getElementById('set-venue-name').value.trim(),
    website_url: document.getElementById('set-website').value.trim(),
    ai_tone: document.getElementById('set-ai-tone').value.trim(),
    brand_voice: document.getElementById('set-brand-voice').value.trim(),
    escalation_threshold: parseInt(document.getElementById('set-escalation-threshold').value) || 29,
    escalation_contact_name: document.getElementById('set-escalation-name').value.trim(),
    escalation_contact_email: document.getElementById('set-escalation-email').value.trim(),
    menus_json: JSON.stringify(menus)
  };

  fetch(DATA_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.disabled = false;
      if (data.success) {
        status.textContent = 'Settings saved! Changes take effect on the next email.';
        status.style.color = 'var(--green)';
      } else {
        status.textContent = 'Error: ' + (data.error || 'unknown');
        status.style.color = 'var(--red)';
      }
    })
    .catch(function(err) {
      btn.disabled = false;
      status.textContent = 'Save failed: ' + err.message;
      status.style.color = 'var(--red)';
    });
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventFlow — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #001524;
      color: #FFECD1;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 3rem;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: #FF7D00;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 20px;
      height: 20px;
      fill: #001524;
    }

    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: #FFECD1;
      letter-spacing: -0.02em;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 1.1;
      margin-bottom: 1.25rem;
      color: #FFECD1;
    }

    h1 span {
      color: #FF7D00;
    }

    p {
      font-size: 1.125rem;
      color: #FFECD1;
      opacity: 0.7;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(21, 97, 109, 0.3);
      border: 1px solid rgba(21, 97, 109, 0.6);
      color: #FFECD1;
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #FF7D00;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .contact {
      font-size: 0.9rem;
      opacity: 0.5;
      margin-top: 1rem;
    }

    .contact a {
      color: #FFECD1;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 236, 209, 0.3);
    }

    .contact a:hover {
      opacity: 1;
      border-bottom-color: #FF7D00;
      color: #FF7D00;
    }
  </style>
</head>
<body>

  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
    <span class="logo-text">EventFlow</span>
  </div>

  <div class="badge">Coming Soon</div>

  <h1>Something great<br/>is <span>in the works.</span></h1>

  <p>We're putting the finishing touches on EventFlow. Check back soon — or reach out if you're interested in learning more.</p>

  <p class="contact">Questions? <a href="mailto:hello@eventflowsales.com">hello@eventflowsales.com</a></p>

</body>
</html>
